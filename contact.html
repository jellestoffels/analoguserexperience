<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact · analoguserexperience</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="sanity-client.js"></script>
    <script defer src="scripts.js"></script>
  
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="analoguserexperience" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <main class="site-shell">
      <header class="page-header">
        <a class="back" href="index.html">← INDEX</a>
        <div class="logo-group">
          <a href="index.html" class="nav-logo"><img src="/resources/images/logo.png" alt="logo" style="filter: brightness(0.70);"></a>
          <h1 class="page-title" style="font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 300; text-transform: lowercase; margin: 0;">contact</h1>
        </div>
      </header>
      
      <section class="content-void" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4vw; margin-top: 4vh;">
        <div>
          <img id="contact-image" src="" alt="Contact banner" class="content-image" style="width: 100%; aspect-ratio: 4/5; object-fit: cover; filter: grayscale(100%) contrast(250%) brightness(0.7); border: var(--line) solid var(--ink); display:none">
        </div>
        <div id="contact-details" class="content-text" style="font-size: clamp(1rem, 1.5vw, 1.25rem); display: flex; flex-direction: column; gap: 2rem;"></div>
      </section>

      <script>
        (async () => {
          const label = (text) =>
            `<div style="font-size:0.75rem;text-transform:uppercase;color:var(--ink-dim);letter-spacing:0.1em;margin-bottom:0.5rem">${text}</div>`;

          try {
            const c = await window.sanityClient.fetch('*[_type == "contact"][0]');
            if (!c) return;

            const imgEl     = document.getElementById('contact-image');
            const detailsEl = document.getElementById('contact-details');
            const titleEl   = document.querySelector('.page-title');

            if (titleEl && c.title) titleEl.textContent = c.title;

            if (imgEl && c.image?.asset?._ref) {
              imgEl.src = window.sanityClient.imageUrl(c.image.asset._ref, 800);
              imgEl.style.display = '';
            }

            let html = '';
            if (c.email) {
              html += `<div>${label('Email')}<a href="mailto:${c.email}" style="color:var(--ink);text-decoration:none">${c.email}</a></div>`;
            }
            if (c.phone) {
              html += `<div>${label('Phone / WhatsApp')}<a href="tel:${c.phone.replace(/\s/g,'')}" style="color:var(--ink);text-decoration:none">${c.phone}</a></div>`;
            }
            if (c.telegram) {
              const handle = c.telegram.startsWith('@') ? c.telegram : `@${c.telegram}`;
              html += `<div>${label('Telegram')}<a href="https://t.me/${c.telegram.replace('@','')}" style="color:var(--ink);text-decoration:none">${handle}</a></div>`;
            }
            if (c.socials && c.socials.length) {
              const links = c.socials
                .map(s => `<a href="${s.url}" style="color:var(--ink);text-decoration:none;display:block">${s.platform}</a>`)
                .join('');
              html += `<div>${label('Socials')}${links}</div>`;
            }
            if (c.address) {
              html += `<div>${label('Address')}<address style="color:var(--ink);font-style:normal;line-height:1.6">${c.address.replace(/\n/g,'<br>')}</address></div>`;
            }

            detailsEl.innerHTML = html;
          } catch (e) {
            console.warn('Could not load contact from Sanity:', e);
          }
        })();
      </script>
    </main>
  </body>
</html>
