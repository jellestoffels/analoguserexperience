<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Info · analoguserexperience</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="sanity-client.js"></script>
    <script defer src="scripts.js"></script>
  
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="analoguserexperience" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <main class="site-shell">
      <header class="page-header">
        <a class="back" href="index.html">← INDEX</a>
        <div class="logo-group">
          <a href="index.html" class="nav-logo"><img src="/resources/images/logo.png" alt="logo" style="filter: brightness(0.70);"></a>
          <h1 class="page-title">INFO</h1>
        </div>
      </header>
      
      <section class="content-void">
        <div>
          <img id="info-image" src="" alt="About us" class="content-image" style="display:none">
        </div>
        <div class="content-text" id="info-text">
          <p id="info-location"></p>
          <p id="info-description"></p>
        </div>
      </section>

      <script>
        (async () => {
          try {
            const info = await window.sanityClient.fetch('*[_type == "info"][0]');
            if (!info) return;
            const titleEl = document.querySelector('.page-title');
            const locEl   = document.getElementById('info-location');
            const descEl  = document.getElementById('info-description');
            const imgEl   = document.getElementById('info-image');
            if (titleEl && info.title) titleEl.textContent = info.title;
            if (locEl)  locEl.textContent  = info.locationAndYear || '';
            if (descEl) descEl.textContent = info.description || '';
            if (imgEl && info.image?.asset?._ref) {
              imgEl.src = window.sanityClient.imageUrl(info.image.asset._ref, 800);
              imgEl.style.display = '';
            }
          } catch (e) {
            console.warn('Could not load info from Sanity:', e);
          }
        })();
      </script>
    </main>
  </body>
</html>
