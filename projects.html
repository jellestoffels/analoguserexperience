<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects · analoguserexperience</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="sanity-client.js"></script>
    <script defer src="scripts.js"></script>
  
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="analoguserexperience" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <main class="site-shell">
      <header class="page-header">
        <a class="back" href="index.html">← INDEX</a>
        <div class="logo-group">
          <a href="index.html" class="nav-logo"><img src="/resources/images/logo.png" alt="logo" style="filter: brightness(0.70);"></a>
          <h1 class="page-title" style="font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 300; text-transform: lowercase; margin: 0;">projects</h1>
        </div>
      </header>
      
      <section class="manga-grid" id="projects-grid">
        <!-- dynamically populated from Sanity -->
      </section>

      <script>
        (async () => {
          const grid = document.getElementById('projects-grid');
          try {
            const projects = await window.sanityClient.fetch(
              '*[_type == "project"] | order(order asc, _createdAt asc) { title, slug, coverImage }'
            );

            if (!projects || projects.length === 0) {
              grid.innerHTML = '<p style="color:var(--ink-dim);letter-spacing:0.1em;text-transform:uppercase;font-size:0.8rem">No projects yet.</p>';
              return;
            }

            projects.forEach((project, i) => {
              const slug   = project.slug?.current || '';
              const title  = project.title || 'Untitled';
              const imgSrc = project.coverImage?.asset?._ref
                ? window.sanityClient.imageUrl(project.coverImage.asset._ref, 800)
                : '';
              const num = String(i + 1).padStart(2, '0');

              const tile = document.createElement('a');
              tile.href      = `projects/project.html?slug=${encodeURIComponent(slug)}`;
              tile.className = 'manga-tile';
              tile.innerHTML = `
                <span class="tile-number">FILE.${num}</span>
                ${imgSrc ? `<img src="${imgSrc}" class="placeholder-img" alt="${title}">` : ''}
                <div class="manga-caption">${title}</div>
              `;
              grid.appendChild(tile);
            });
          } catch (e) {
            console.warn('Could not load projects from Sanity:', e);
          }
        })();
      </script>
    </main>
  </body>
</html>
